name: Auto version bump

# Bumps the patch version in package.json on every push to master that
# touches source or dependencies. Users of `cib7-mcp` will then see an
# "update available" notification via the in-repo updater, which compares
# the local package.json against the one on master.
#
# Infinite-loop protection: the commit this workflow pushes includes
# "[skip ci]" in its message, and the push filter below ignores commits
# authored by github-actions[bot]. Either guard alone is enough; having
# both is belt and braces.

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

jobs:
  bump:
    # Skip if the push is the bot's own bump commit, or if any commit in the
    # push explicitly opts out with [skip ci] / [skip-ci] in its message.
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[skip-ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so we can push a commit back.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; it's scoped to this repo and the
          # `contents: write` permission above is enough to push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Bump patch version
        id: bump
        run: |
          # npm version bumps package.json (and package-lock.json if present),
          # but we don't want it to create a git tag or commit — we'll do that
          # ourselves in the next step so we can control the commit message.
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Commit and push bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD:master
